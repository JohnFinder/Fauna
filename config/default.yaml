data:
  sample_rate: 48000
  max_duration_ms: 400
  n_mels: 128
  f_min: 500
  f_max: 10000
  n_fft: 240
  hop_length: 120

model:
  size: small
  dim: 256
  num_layers: 8
  num_heads: 4
  ffn_dim: 1024
  conv_kernel_size: 31
  dropout: 0.1
  patch_freq: 16
  patch_time: 4

mae:
  mask_ratio: 0.75
  decoder_dim: 128
  decoder_layers: 4
  decoder_heads: 4

pretrain:
  epochs: 150
  batch_size: 256
  lr: 0.0002
  weight_decay: 0.01
  warmup_epochs: 10
  mixup_alpha: 0.3

finetune:
  epochs: 50
  batch_size: 64
  encoder_lr: 0.0001
  head_lr: 0.0005
  weight_decay: 0.01
  num_prototypes: 5
  novelty_threshold: 0.3

tags:
  num_acoustic_functional: 9
  num_context: 7
  num_context_features: 7
